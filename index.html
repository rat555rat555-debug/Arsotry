<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Poster Scanner</title>

  <!-- A-Frame (เอเฟรม = เฟรมเวิร์กทำฉาก 3D บนเว็บ) -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- MindAR (มายด์เออาร์ = ระบบสแกนภาพสำหรับเว็บ AR) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div id="startScreen">
    <div class="card">
      <h1>AR Poster Scanner</h1>
      <p>
        กดปุ่มเริ่ม แล้วนำกล้องไปส่องภาพโปสเตอร์ที่ตั้งไว้
        เมื่อเจอภาพ ระบบจะแสดงวิดีโอทับบนโปสเตอร์
      </p>
      <button id="startBtn">เริ่มสแกน</button>
      <p class="small">
        หมายเหตุ: ต้องเปิดผ่าน HTTPS (เอชทีทีพีเอส = เว็บปลอดภัย) หรือ localhost
      </p>
    </div>
  </div>

  <div id="statusBox">กำลังรอเริ่มระบบ...</div>

  <a-scene
    id="arScene"
    mindar-image="imageTargetSrc: ./targets/poster.mind; autoStart: false;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded>

    <a-assets>
      <!-- เปลี่ยนไฟล์วิดีโอตรงนี้ได้ -->
      <video
        id="arVideo"
        src="./videos/sample.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline>
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- targetIndex: 0 หมายถึงภาพเป้าหมายภาพแรกในไฟล์ poster.mind -->
    <a-entity id="targetEntity" mindar-image-target="targetIndex: 0">
      <!-- width / height ปรับอัตราส่วนวิดีโอได้ เช่น 16:9 = 1 / 0.5625 -->
      <a-video
        id="videoPlane"
        src="#arVideo"
        width="1"
        height="0.5625"
        position="0 0 0">
      </a-video>
    </a-entity>
  </a-scene>

  <script src="./script.js"></script>
</body>
</html>
